name: CI - Hate Speech Model Training

on:
  push:
    branches:
      - main
    paths:
      - 'MLProject/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:  

env:
  PYTHON_VERSION: "3.12.7"
  MLFLOW_VERSION: "2.19.0"

jobs:
  preprocessing:
    name: Data Preprocessing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('MLProject/conda.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scipy scikit-learn nltk joblib mlflow==${{ env.MLFLOW_VERSION }}

      - name: Download NLTK resources
        run: |
          python -c "import nltk; nltk.download('punkt'); nltk.download('stopwords'); nltk.download('punkt_tab')"

      - name: Run preprocessing
        run: |
          cd MLProject
          python automate_Luqman.py \
            --data data.csv \
            --kamusalay new_kamusalay.csv \
            --output data_preprocessing \
            --test_size 0.2 \
            --max_features 10000

      - name: Upload preprocessed data artifact
        uses: actions/upload-artifact@v4
        with:
          name: data_preprocessing
          path: MLProject/data_preprocessing/
          retention-days: 7

  training:
    name: Model Training
    runs-on: ubuntu-latest
    needs: preprocessing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scipy scikit-learn mlflow==${{ env.MLFLOW_VERSION }} \
                      nltk joblib matplotlib seaborn dagshub

      - name: Download preprocessed data
        uses: actions/download-artifact@v4
        with:
          name: data_preprocessing
          path: MLProject/data_preprocessing/

      - name: Run MLflow Project (local tracking)
        run: |
          cd MLProject
          mlflow run . \
            --env-manager=local \
            -P data_dir=data_preprocessing

      - name: Log to DagsHub and copy model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          python - <<'EOF'
          import mlflow, os, shutil, glob

          # Gunakan Run ID langsung dari mlflow run output
          # mlruns ada di dalam MLProject/ karena cd MLProject sebelum mlflow run
          base = "MLProject/mlruns"

          # Debug: tampilkan semua yang ada
          print("=== Isi mlruns ===")
          for root, dirs, files in os.walk(base):
              level = root.replace(base, '').count(os.sep)
              indent = ' ' * 2 * level
              print(f"{indent}{os.path.basename(root)}/")
              if level < 4:
                  for f in files:
                      print(f"{indent}  {f}")

          # Cari MLmodel file (penanda lokasi model)
          mlmodel_files = glob.glob(f"{base}/**/MLmodel", recursive=True)
          print(f"\nMLmodel files: {mlmodel_files}")

          if not mlmodel_files:
              raise FileNotFoundError("Tidak ada MLmodel ditemukan")

          # Ambil folder model (parent dari MLmodel)
          model_dir = os.path.dirname(mlmodel_files[0])
          print(f"Model dir: {model_dir}")

          # Copy ke /tmp
          os.makedirs("/tmp/mlflow_model", exist_ok=True)
          shutil.copytree(model_dir, "/tmp/mlflow_model/model")
          print("Model berhasil di-copy ke /tmp/mlflow_model/model")

          # Log ke DagsHub
          mlflow.set_tracking_uri(os.environ["MLFLOW_TRACKING_URI"])
          mlflow.set_experiment("HateSpeech_Classification")

          with mlflow.start_run():
              mlflow.log_artifacts("/tmp/mlflow_model/model", artifact_path="model")
              print("Berhasil log ke DagsHub")
          EOF

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlflow_model
          path: /tmp/mlflow_model/
          retention-days: 7

  build_docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: training

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install MLflow
        run: pip install mlflow==${{ env.MLFLOW_VERSION }}

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: mlflow_model
          path: /tmp/mlflow_model/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          IMAGE_NAME="${DOCKERHUB_USERNAME}/hate-speech-classifier:latest"
          MODEL_PATH="/tmp/mlflow_model/model"

          echo "Building from: ${MODEL_PATH}"
          mlflow models build-docker \
            --model-uri "${MODEL_PATH}" \
            --name "${IMAGE_NAME}"

      - name: Push Docker image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          docker push "${DOCKERHUB_USERNAME}/hate-speech-classifier:latest"
          echo "Done: ${DOCKERHUB_USERNAME}/hate-speech-classifier:latest"