name: CI - Hate Speech Model Training

on:
  push:
    branches:
      - main
    paths:
      - 'MLProject/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:  

env:
  PYTHON_VERSION: "3.12.7"
  MLFLOW_VERSION: "2.19.0"

jobs:
  preprocessing:
    name: Data Preprocessing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('MLProject/conda.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scipy scikit-learn nltk joblib mlflow==${{ env.MLFLOW_VERSION }}

      - name: Download NLTK resources
        run: |
          python -c "import nltk; nltk.download('punkt'); nltk.download('stopwords'); nltk.download('punkt_tab')"

      - name: Run preprocessing
        run: |
          cd MLProject
          python automate_Luqman.py \
            --data data.csv \
            --kamusalay new_kamusalay.csv \
            --output data_preprocessing \
            --test_size 0.2 \
            --max_features 10000

      - name: Upload preprocessed data artifact
        uses: actions/upload-artifact@v4
        with:
          name: data_preprocessing
          path: MLProject/data_preprocessing/
          retention-days: 7

  training:
    name: Model Training
    runs-on: ubuntu-latest
    needs: preprocessing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          auto-activate-base: true
          auto-update-conda: false

      - name: Install MLflow
        shell: bash -el {0}
        run: |
          pip install mlflow==${{ env.MLFLOW_VERSION }} dagshub

      - name: Download preprocessed data
        uses: actions/download-artifact@v4
        with:
          name: data_preprocessing
          path: MLProject/data_preprocessing/

      - name: Run MLflow Project
        shell: bash -el {0}
        run: |
          cd MLProject
          mlflow run . --experiment-name HateSpeech_Classification --env-manager=conda

      - name: Copy model from local mlruns
        shell: bash -el {0}
        run: |
          python - <<'EOF'
          import os, shutil, glob

          mlmodel_files = glob.glob("MLProject/mlruns/**/MLmodel", recursive=True)
          print(f"MLmodel ditemukan: {mlmodel_files}")

          if not mlmodel_files:
              raise FileNotFoundError("Tidak ada MLmodel di mlruns lokal")

          model_dir = os.path.dirname(max(mlmodel_files, key=os.path.getmtime))
          print(f"Model dir: {model_dir}")

          os.makedirs("/tmp/mlflow_model", exist_ok=True)
          shutil.copytree(model_dir, "/tmp/mlflow_model/model")
          print("Model berhasil di-copy ke /tmp/mlflow_model/model")
          EOF

      - name: Log to DagsHub
        shell: bash -el {0}
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          python - <<'EOF'
          import mlflow, os

          # Baca run dari local mlruns
          local_uri = "file://" + os.path.abspath("MLProject/mlruns")
          mlflow.set_tracking_uri(local_uri)
          client = mlflow.tracking.MlflowClient()

          exp = client.get_experiment_by_name("HateSpeech_Classification")
          runs = client.search_runs(
              exp.experiment_id,
              order_by=["start_time DESC"],
              max_results=1
          )
          local_run = runs[0]
          print(f"Local Run ID: {local_run.info.run_id}")
          print(f"Metrics: {local_run.data.metrics}")

          # Log ke DagsHub
          mlflow.set_tracking_uri(os.environ["MLFLOW_TRACKING_URI"])
          mlflow.set_experiment("HateSpeech_Classification")

          with mlflow.start_run():
              for key, value in local_run.data.metrics.items():
                  mlflow.log_metric(key, value)
              for key, value in local_run.data.params.items():
                  mlflow.log_param(key, value)
              mlflow.log_artifacts("/tmp/mlflow_model/model", artifact_path="model")
              print("Berhasil log ke DagsHub")
          EOF

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlflow_model
          path: /tmp/mlflow_model/
          retention-days: 7

  build_docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: training

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install MLflow
        run: pip install mlflow==${{ env.MLFLOW_VERSION }}

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: mlflow_model
          path: /tmp/mlflow_model/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          IMAGE_NAME="${DOCKERHUB_USERNAME}/hate-speech-classifier:latest"
          MODEL_PATH="/tmp/mlflow_model/model"

          cat > /tmp/Dockerfile <<'DOCKERFILE'
          FROM python:3.10-slim

          WORKDIR /app

          RUN pip install --no-cache-dir \
              mlflow==2.19.0 \
              scikit-learn==1.5.2 \
              pandas==2.2.2 \
              numpy==1.26.4 \
              scipy==1.13.1 \
              nltk==3.9.1 \
              joblib==1.4.2

          COPY model/ /app/model/

          EXPOSE 8080

          CMD ["mlflow", "models", "serve", \
               "--model-uri", "/app/model", \
               "--host", "0.0.0.0", \
               "--port", "8080", \
               "--no-conda"]
          DOCKERFILE

          cp -r ${MODEL_PATH} /tmp/model

          docker build -f /tmp/Dockerfile -t "${IMAGE_NAME}" /tmp/
          echo "Build selesai: ${IMAGE_NAME}"

      - name: Push Docker image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          docker push "${DOCKERHUB_USERNAME}/hate-speech-classifier:latest"
          echo "Done: ${DOCKERHUB_USERNAME}/hate-speech-classifier:latest"